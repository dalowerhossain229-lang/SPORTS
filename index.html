<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bet365 Premium Multi-Sportsbook - VIP CASINO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bet365-stadium">
    
    <!-- 🏟️ [🔒 Bet365 অবিকল ৪-কলাম মাল্টি-স্পোর্টস ডাইনামিক হরাইজন্টাল নেভিগেশন মেনুবার 🔒] -->
    <div class="bet365-sports-nav-scroll">
        <button class="sports-nav-tab active" id="tab-live" onclick="switchSportsCategory('live')">🔴 LIVE SPORTS</button>
        <button class="sports-nav-tab" id="tab-cricket" onclick="switchSportsCategory('cricket')">🏏 CRICKET</button>
        <button class="sports-nav-tab" id="tab-football" onclick="switchSportsCategory('football')">⚽ FOOTBALL</button>
        <button class="sports-nav-tab" id="tab-tennis" onclick="switchSportsCategory('tennis')">🎾 TENNIS</button>
    </div>

    <!-- 📥 [🔒 ওস্তাদ! খাতার ১ম পৃষ্ঠা অনুসারী LIVE SPORTS এর ভেতরের ৩টি সাব-অপশন প্যানেল বর্ম 🔒] -->
    <div id="live-sports-sub-bar" class="cricket-formats-sub-nav" style="display: flex;">
        <button class="cricket-format-btn active" id="live-sub-all" onclick="filterLiveSportsSub('all')">ALL LIVE</button>
        <button class="cricket-format-btn" id="live-sub-cricket" onclick="filterLiveSportsSub('cricket')">CRICKET LIVE</button>
        <button class="cricket-format-btn" id="live-sub-football" onclick="filterLiveSportsSub('football')">FOOTBALL LIVE</button>
        <button class="cricket-format-btn" id="live-sub-tennis" onclick="filterLiveSportsSub('tennis')">TENNIS LIVE</button>
    </div>

    <!-- 🎰 [🔒 থার্ড-পার্টি ডাটা ফিড থেকে আসা তাজা ম্যাচের ১X২ ডিসপ্লে গ্রিд কন্টেইনার কড়া লক 🔒] -->
    <div id="bet365-sports-grid" class="bet365-grid-wrapper">
        <div style="text-align: center; padding: 40px; color: #888; font-family: sans-serif; font-weight: bold;">
            ⏳ স্পোর্টস লাইভ ডাটা ফিড কানেক্ট হচ্ছে...
        </div>
    </div>

    <!-- 🔳 [🔒 বাজি ধরার পর গোল্ডেন বেট স্লিপ কনফার্মেশন মডাল পপআপ 🔒] -->
    <div id="bet365-slip-overlay" class="bet365-popup-overlay">
        <div class="bet365-popup-box">
            <div class="bet365-popup-title" id="slip-match-title">Real Madrid vs Barcelona</div>
            <div class="slip-market-badge" id="slip-market-name">Match Winner</div>
            <div class="slip-details-row">
                Selection: <span id="slip-selection" style="color: #ffdf00; font-weight: 950;">Home</span> 
                | Odds: <span id="slip-odds" style="color: #00ff66; font-weight: 950;">1.85</span>
            </div>
            <div class="slip-input-container">
                <input type="number" id="slip-bet-amount" value="100" min="10" placeholder="BDT Stake">
            </div>
            <div class="slip-btn-group">
                <button class="slip-cancel-btn" onclick="closeBet365SlipModal()">CANCEL</button>
                <button class="slip-confirm-btn" id="slip-submit-btn" onclick="confirmBet365Placement()">PLACE BET</button>
            </div>
        </div>
    </div>

    <!-- 📜 [🔒 আলাদা ডেডিকেটেড স্পোর্টস বেট হিস্টোরি স্লাইডিং প্যানেল 🔒] -->
    <div id="sports-history-sidebar" class="sports-history-panel-overlay">
        <div class="sports-history-content-box">
            <div class="history-panel-header">
                <h3>📋 SPORTS BET HISTORY</h3>
                <button class="history-close-x-btn" onclick="toggleSportsHistoryPanel(false)">✕</button>
            </div>
            <div id="sports-history-log-list" class="history-log-scroll-area">
                <div style="text-align: center; padding: 20px; color: #aaa;">⏳ বাজি লগ লোড হচ্ছে...</div>
            </div>
        </div>
    </div>

    <!-- 🔲 [🔒 ওস্তাদ! নিচে সাদা মার্ক করা জায়গায় ডেডিকেটেড ফিক্সд Betslip বাটন বর্ম লক 🔒] -->
    <div class="bet365-footer-betslip-bar" onclick="toggleSportsHistoryPanel(true)">
        <div class="betslip-btn-content">
            <span class="betslip-icon">📋</span>
            <span class="betslip-text">BET SLIP / LIVE CASHOUT</span>
        </div>
    </div>

</div>

<!-- 📢 Sockets নেটওয়ার্ক ও ইউনিভার্সাল ওতো-ড্রাইভার স্ক্রিপ্ট লজিক -->
<script src="/socket.io/socket.io.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
    const urlWallet = urlParams.get('wallet') || "main";
    
    const SERVER_URL = window.location.origin;

    let balance = 0.00;
    let isBetPlacing = false;
    let activeSlipData = null;
    let currentActiveCategory = 'live'; 
    let currentLiveSportsSub = 'all'; 
    let cachedGlobalMatches = [];
    let expandedMatchesMap = {}; // 👈 ওস্তাদ! কোন কার্ড খোলা বা বন্ধ তার মেমোরি ট্র্যাকার বর্ম!

    const socket = io({
        transports: ['websocket', 'polling'],
        upgrade: true
    });

    async function fetchLiveBalance() {
        try {
            const response = await fetch(`${SERVER_URL}/api/rainbow-balance?userId=${urlUserId}&wallet=${urlWallet}`);
            const data = await response.json();
            if (data && data.success) { balance = parseFloat(data.balance); }
        } catch (e) { console.error("Balance delay handled"); }
    }

    socket.on("bet365LiveOddsUpdate", (matches) => {
        cachedGlobalMatches = matches;
        renderBet365LuxuryOddsTable();
    });

    function switchSportsCategory(categoryName) {
        currentActiveCategory = categoryName;
        document.querySelectorAll('.sports-nav-tab').forEach(btn => btn.classList.remove('active'));
        
        const targetTab = document.getElementById(`tab-${categoryName}`);
        if (targetTab) targetTab.classList.add('active');
        
        const subBar = document.getElementById("live-sports-sub-bar");
        if (subBar) { subBar.style.display = (categoryName === 'live') ? "flex" : "none"; }
        
        currentLiveSportsSub = 'all'; 
        document.querySelectorAll('.cricket-format-btn').forEach(btn => btn.classList.remove('active'));
        const defaultSub = document.getElementById("live-sub-all");
        if (defaultSub) defaultSub.classList.add('active');

        renderBet365LuxuryOddsTable();
    }

    function filterLiveSportsSub(subName) {
        currentLiveSportsSub = subName;
        document.querySelectorAll('.cricket-format-btn').forEach(btn => btn.classList.remove('active'));
        const targetSubTab = document.getElementById(`live-sub-${subName}`);
        if (targetSubTab) targetSubTab.classList.add('active');
        renderBet365LuxuryOddsTable();
    }

    // 🔄 [🔒 ওস্তাদ! কার্ডে চাপ দিলে সাব-মার্কেট এক্সপ্যান্ড (স্লাইড ডাউন) করার ক্লিক কন্ট্রোলার 🔒]
    function toggleMatchMarketsContainer(matchId, event) {
        // ওস্তাদ! বাজি ধরার বাটনে চাপ দিলে যাতে পুরো কার্ড বন্ধ না হয়, তার সিকিউরিটি ফিল্টার ভাই!
        if (event && (event.target.tagName === 'BUTTON' || event.target.closest('button'))) {
            return;
        }
        expandedMatchesMap[matchId] = !expandedMatchesMap[matchId];
        renderBet365LuxuryOddsTable();
    }

    // 🎰 [🔒 খাতার ৪টি পাতার অল-মার্কেট এক্সপ্যান্ডেবল মেগা রেন্ডারিং ইঞ্জিন লক 🔒]
    function renderBet365LuxuryOddsTable() {
        const container = document.getElementById("bet365-sports-grid");
        if (!container) return;

        let filteredMatches = cachedGlobalMatches;
        if (currentActiveCategory !== 'live') {
            filteredMatches = cachedGlobalMatches.filter(m => m.sport === currentActiveCategory);
        } else if (currentLiveSportsSub !== 'all') {
            filteredMatches = cachedGlobalMatches.filter(m => m.sport === currentLiveSportsSub);
        }

        if (!filteredMatches || filteredMatches.length === 0) {
            container.innerHTML = `<div style="text-align: center; padding: 40px; color: #888; font-family: sans-serif; font-weight: bold;">🏁 এই মুহূর্তে কোনো সচল ${currentActiveCategory.toUpperCase()} ম্যাচ নেই ওস্তাদ!</div>`;
            return;
        }

        let html = "";
        filteredMatches.forEach(m => {
            let isExpanded = expandedMatchesMap[m.matchId] || false;
            let marketsHTML = "";

            // --- ⚽ ফুটবলের জন্য খাতার ২ নম্বর পাতার অল-মার্কেট প্যানেল ---
            if (m.sport === 'football') {
                let innerMarkets = "";
                if (isExpanded) {
                    innerMarkets = `
                        <!-- খাতার ২ নম্বর পাতার ১ম টেবিল: Full time result -->
                        <div class="market-section-block" style="margin-top:8px;">
                            <div class="market-header-title">Full Time Result</div>
                            <div class="odds-row-buttons">
                                <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Time Result', 'Team 1 Win', ${m.odds.fullTimeResult.home})">Team 1 Win<br><span>${m.odds.fullTimeResult.home}</span></button>
                                <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Time Result', 'Draw', ${m.odds.fullTimeResult.draw})">Draw<br><span>${m.odds.fullTimeResult.draw}</span></button>
                                <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Time Result', 'Team 2 Win', ${m.odds.fullTimeResult.away})">Team 2 Win<br><span>${m.odds.fullTimeResult.away}</span></button>
                            </div>
                        </div>
                        
                    <!-- 🎰 [🔒 খাতার ২ নম্বর পাতার ২য় টেবিল: Double Chance এবং Match Goal Line 🔒] -->
                    <div class="market-section-block" style="margin-top:6px;">
                        <div class="market-header-title">Double Chance</div>
                        <div class="odds-row-buttons">
                            <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Double Chance', '1X (Home/Draw)', ${m.odds.doubleChance.homeDraw})">1X (Home/Draw)<br><span>${m.odds.doubleChance.homeDraw}</span></button>
                            <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Double Chance', 'X2 (Away/Draw)', ${m.odds.doubleChance.awayDraw})">X2 (Away/Draw)<br><span>${m.odds.doubleChance.awayDraw}</span></button>
                        </div>

                        <div class="market-header-title" style="margin-top:8px;">Match Goal (O/U 1.5)</div>
                        <div class="odds-row-buttons">
                            <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Goal', 'Over 1.5', ${m.odds.matchGoal.line1_5.over})">Over 1.5<br><span>${m.odds.matchGoal.line1_5.over}</span></button>
                            <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Goal', 'Under 1.5', ${m.odds.matchGoal.line1_5.under})">Under 1.5<br><span>${m.odds.matchGoal.line1_5.under}</span></button>
                        </div>
                    </div>

                    <!-- 📐 [🔒 খাতার ২ নম্বর পাতার ৩য় টেবিল: Match Corners এবং Number of Cards 🔒] -->
                    <div class="market-section-block" style="margin-top:6px;">
                        <div class="market-header-title" style="color:#ffdf00;">📐 Match Corners (Over / Exactly / Under)</div>
                        <div style="display:flex; flex-direction:column; gap:4px; margin-top:4px;">
                            ${[6, 7, 8, 9].map(num => {
                                let c = m.odds.matchCorners[`line${num}`];
                                return `
                                    <div style="display:flex; gap:4px; align-items:center;">
                                        <span style="color:#fff; font-size:11px; font-weight:900; min-width:18px; text-align:center;">${num}</span>
                                        <button class="odds-bet-btn" style="padding:4px 0; font-size:11px;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Corners', '${num} Over', ${c.over})">Over <span>${c.over}</span></button>
                                        <button class="odds-bet-btn" style="padding:4px 0; font-size:11px;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Corners', '${num} Exact', ${c.exactly})">Exact <span>${c.exactly}</span></button>
                                        <button class="odds-bet-btn" style="padding:4px 0; font-size:11px;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Corners', '${num} Under', ${c.under})">Under <span>${c.under}</span></button>
                                    </div>
                                `;
                            }).join('')}
                        </div>

                        <div class="market-header-title" style="margin-top:8px; color:#ff003c;">🟨 Number of Cards</div>
                        <div class="odds-row-buttons">
                            <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Number of Cards', 'Over 1.5 Cards', ${m.odds.numberOfCards.over1_5})">Over 1.5<br><span>${m.odds.numberOfCards.over1_5}</span></button>
                            <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Number of Cards', 'Under 1.5 Cards', ${m.odds.numberOfCards.under1_5})">Under 1.5<br><span>${m.odds.numberOfCards.under1_5}</span></button>
                        </div>
                    </div>
                `;
            }
            marketsHTML = `
                <div style="background:#090f11; padding:6px; border-radius:6px; margin-top:4px; text-align:center; color:#8fa39b; font-size:11px; font-weight:bold;">
                    🔽 CLICK MATCH TO EXPAND FOOTBALL MARKETS
                </div>
                ${innerMarkets}
            `;
        } else if (m.sport === 'cricket') {
            // 🏏 [🔒 খাতার ৩ ও ৪ নম্বর পাতার অবিকল ক্রিকেট T20, ODI ও TEST কাস্টম মার্কেট লুপ 🔒]
            let innerCricket = "";
            let formatBadge = String(m.matchFormat).toUpperCase() || "LIVE";
            
            if (isExpanded) {
                if (m.matchFormat === "odi" || m.matchFormat === "t20") {
                    // ওয়ানডে ও টি২০ এর জন্য কাস্টম সেশন ওভার রান, উইকেট এবং Odd/Even মার্কেট চেইন লক!
                    let sessionLine = m.matchFormat === "odi" ? "321.5" : "165.5";
                    let sessionOver = m.matchFormat === "odi" ? m.odds.team1_50OversRuns.line321_5.over : m.odds.t20PowerplayRuns.line48_5.over;
                    let sessionUnder = m.matchFormat === "odi" ? m.odds.team1_50OversRuns.line321_5.under : m.odds.t20PowerplayRuns.line48_5.under;
                    let pplayTitle = m.matchFormat === "odi" ? "Runs in 1st 10 Overs (Line 30)" : "Runs in 1st 6 Overs (Line 45)";
                    let pplayOver = m.matchFormat === "odi" ? m.odds.runsIn1st10Overs.line30.over : m.odds.runsIn1st6Overs.line45.over;
                    let pplayUnder = m.matchFormat === "odi" ? m.odds.runsIn1st10Overs.line30.under : m.odds.runsIn1st6Overs.line45.under;

                    innerCricket = `
                        <div class="market-section-block">
                            <div class="market-header-title">Next Over Runs (Line 9.5)</div>
                            <div class="odds-row-buttons">
                                <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Next Over Runs', 'Over 9.5', ${m.odds.nextOverRuns.over9_5})">Over 9.5<br><span>${m.odds.nextOverRuns.over9_5}</span></button>
                                <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Next Over Runs', 'Under 9.5', ${m.odds.nextOverRuns.under9_5})">Under 9.5<br><span>${m.odds.nextOverRuns.under9_5}</span></button>
                            </div>

                            <div class="market-header-title" style="margin-top:8px;">Next Over Run Odd/Even</div>
                            <div class="odds-row-buttons">
                                <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Next Over Run Odd/Even', 'Odd', ${m.odds.nextOverOddEven.odd})">Odd<br><span>${m.odds.nextOverOddEven.odd}</span></button>
                                <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Next Over Run Odd/Even', 'Even', ${m.odds.nextOverOddEven.even})">Even<br><span>${m.odds.nextOverOddEven.even}</span></button>
                            </div>

                            <div class="market-header-title" style="margin-top:8px;">Next Over Team 1 Wicket</div>
                            <div class="odds-row-buttons">
                                <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Next Over Wicket', 'Yes', ${m.odds.nextOverWicket.yes})">Yes<br><span>${m.odds.nextOverWicket.yes}</span></button>
                                <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Next Over Wicket', 'No', ${m.odds.nextOverWicket.no})">No<br><span>${m.odds.nextOverWicket.no}</span></button>
                            </div>

                            <div class="market-header-title" style="margin-top:8px;">Team 1 Full Innings Runs (Line ${sessionLine})</div>
                            <div class="odds-row-buttons">
                                <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Innings Runs', 'Over ${sessionLine}', ${sessionOver})">Over ${sessionLine}<br><span>${sessionOver}</span></button>
                                <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Innings Runs', 'Under ${sessionLine}', ${sessionUnder})">Under ${sessionLine}<br><span>${sessionUnder}</span></button>
                            </div>

                            <div class="market-header-title" style="margin-top:8px;">${pplayTitle}</div>
                            <div class="odds-row-buttons">
                                <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Powerplay Runs', 'Over Line', ${pplayOver})">Over Line<br><span>${pplayOver}</span></button>
                                <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Powerplay Runs', 'Under Line', ${pplayUnder})">Under Line<br><span>${pplayUnder}</span></button>
                            </div>
                        </div>
                    `;
                        } else if (m.matchFormat === 'test') {
            // টেস্ট ম্যাচের জন্য লিড, ড্র, সেশন ও ডাইনামিক সেশন ওডস
            innerCricket = `
                <div class="market-section-block" style="margin-top:6px;">
                    <div class="market-header-title">Match Winner 3-Way</div>
                    <div class="odds-row-buttons">
                        <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Winner 3-Way', 'Team 1 (${m.teamHome})', ${m.odds.matchWinner3Way.home})">1<br><span>${m.odds.matchWinner3Way.home}</span></button>
                        <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Winner 3-Way', 'Draw (X)', ${m.odds.matchWinner3Way.draw})">X<br><span>${m.odds.matchWinner3Way.draw}</span></button>
                        <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Winner 3-Way', 'Team 2 (${m.teamAway})', ${m.odds.matchWinner3Way.away})">2<br><span>${m.odds.matchWinner3Way.away}</span></button>
                    </div>
                    <div class="market-header-title" style="margin-top:6px;">1st Innings Lead</div>
                    <div class="odds-row-buttons">
                        <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', '1st Innings Lead', '${m.teamHome}', ${m.odds.firstInningsLead.homeLead})">${m.teamHome}<br><span>${m.odds.firstInningsLead.homeLead}</span></button>
                        <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', '1st Innings Lead', '${m.teamAway}', ${m.odds.firstInningsLead.awayLead})">${m.teamAway}<br><span>${m.odds.firstInningsLead.awayLead}</span></button>
                    </div>
                </div>
            `;
        }

// 🎛️ ওস্তাদ! কার্ডের ওপর ক্লিক করলেই পুরো ড্রপডাউন মার্কেট মাখনের মতো এক টানে অন-অফ হবে!
function toggleMatchExpansionCard(matchId) {
    expandedMatchesMap[matchId] = !expandedMatchesMap[matchId];
    renderBet365LuxuryOddsTable();
}


function openBet365SlipModal(matchId, matchTitle, marketName, selection, oddsValue) {
    if (isBetPlacing) return;
    activeSlipData = { matchId, matchTitle, marketName, selection, odds: oddsValue };
    document.getElementById("slip-match-title").innerText = matchTitle;
    document.getElementById("slip-market-name").innerText = marketName;
    document.getElementById("slip-selection").innerText = selection;
    document.getElementById("slip-odds").innerText = oddsValue.toFixed(2);
    document.getElementById("bet365-slip-overlay").style.display = "flex";
    
    // ইভেন্ট বাবলিং প্রোটেকশন বর্ম লক ভাই ভাই
    if (window.event) window.event.stopPropagation();
}

function closeBet365SlipModal() {
    document.getElementById("bet365-slip-overlay").style.display = "none";
    activeSlipData = null;
    if (window.event) window.event.stopPropagation();
}

async function confirmBet365Placement() {
    if (isBetPlacing || !activeSlipData) return;
    const stakeInput = document.getElementById("slip-bet-amount");
    const betAmt = parseFloat(stakeInput.value);

    if (isNaN(betAmt) || betAmt < 10 || betAmt > 20000) {
        alert("❌ Invalid Stake Amount (৳১০ - ৳২০০০০)!");
        return;
    }

    isBetPlacing = true;
    const submitBtn = document.getElementById("slip-submit-btn");
    submitBtn.disabled = true;
    submitBtn.innerText = "PLACING... ⏳";

    try {
        const response = await fetch(`${SERVER_URL}/api/jili-bet`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: urlUserId, matchId: activeSlipData.matchId, marketName: activeSlipData.marketName,
                selection: activeSlipData.selection, odds: activeSlipData.odds, amount: betAmt, wallet: urlWallet
            })
        });

        const result = await response.json();
        if (result.success === true) {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            alert(result.message || "🎯 Bet accepted! Good Luck.");
            closeBet365SlipModal();
            fetchSportsBetHistoryLog(); 
        } else {
            alert(result.message || "❌ Bet Declined!");
        }
    } catch (err) {
        alert("⚠️ সেশন আউট! আবার বাজি প্লে করুন ওস্তাদ ভাই ভাই।");
    } finally {
        isBetPlacing = false;
        submitBtn.disabled = false;
        submitBtn.innerText = "PLACE BET";
    }
}

function toggleSportsHistoryPanel(showPanel) {
    const sidebar = document.getElementById("sports-history-sidebar");
    if (sidebar) {
        sidebar.style.display = showPanel ? "flex" : "none";
        if (showPanel) fetchSportsBetHistoryLog();
    }
    if (window.event) window.event.stopPropagation();
}

async function fetchSportsBetHistoryLog() {
    const historyListContainer = document.getElementById("sports-history-log-list");
    if (!historyListContainer) return;
    try {
        const response = await fetch(`${SERVER_URL}/api/sportsbook/bet-history?userId=${urlUserId}`);
        const data = await response.json();
        if (data && data.success && data.history.length > 0) {
            let logHTML = "";
            data.history.reverse().forEach(log => {
                let cashoutButtonHTML = "";
                if (log.status === "RUNNING") {
                    let currentCashoutOffer = log.stake * 0.90; 
                    cashoutButtonHTML = `<button class="live-cashout-action-btn" onclick="triggerLiveSportsCashout(event, '${log.ticketId}', ${currentCashoutOffer})">💰 CASH OUT: ৳${currentCashoutOffer.toFixed(2)}</button>`;
                }

                logHTML += `
                    <div class="history-log-card-item">
                        <div class="log-match-title">🏟️ ${log.matchTitle}</div>
                        <div class="log-market-sub">${log.marketName} | Pick: <b style="color:#ffdf00;">${log.selection}</b></div>
                        <div class="log-data-row-flex">
                            <span>Odds: <b>${log.odds.toFixed(2)}</b></span>
                            <span>Stake: <b style="color:#00ff66;">৳${log.stake.toFixed(2)}</b></span>
                        </div>
                        <div class="log-payout-row" style="margin-bottom:6px;">
                            <span>Payout: <b>৳${log.potentialPayout.toFixed(2)}</b></span>
                            <span class="log-status-badge ${log.status === 'RUNNING' ? 'status-running' : 'status-settled'}">${log.status}</span>
                        </div>
                        ${cashoutButtonHTML}
                    </div>
                `;
            });
            historyListContainer.innerHTML = logHTML;
        } else {
            historyListContainer.innerHTML = `<div style="text-align: center; padding: 40px; color: #888;">📊 আপনার কোনো স্পোর্টস বাজি রেকর্ড নেই ওস্তাদ!</div>`;
        }
    } catch (e) { historyListContainer.innerHTML = `<div style="text-align: center; padding: 20px; color: #ff003c;">⚠️ হিস্টোরি লোড এরর!</div>`; }
}

async function triggerLiveSportsCashout(e, ticketId, cashoutAmt) {
    if (e) e.stopPropagation();
    if (!confirm(`🎰 আপনি কি এই বাজি টিকিটটি এখনই ৳${cashoutAmt.toFixed(2)} এ ক্যাশআউট করতে চান ওস্তাদ?`)) return;
    try {
        const response = await fetch(`${SERVER_URL}/api/sportsbook/cashout`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: urlUserId, betTicketId: ticketId, cashoutAmount: cashoutAmt, wallet: urlWallet })
        });
        const result = await response.json();
        alert(result.message);
        if (result.success) {
            fetchLiveBalance();
            fetchSportsBetHistoryLog();
        }
    } catch (err) { alert("🚨 ক্যাশআউট কানেকশন ডিলে!"); }
}

socket.on("balanceUpdate", (data) => {
    if (data && data.username === urlUserId) {
        if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
        fetchLiveBalance();
    }
});

window.onload = () => {
    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
    fetchLiveBalance();
    setTimeout(fetchLiveBalance, 400);
    renderBet365LuxuryOddsTable();
};
</script>
