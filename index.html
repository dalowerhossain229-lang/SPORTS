<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bet365 Premium Sportsbook - VIP MULTI-SPORTS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bet365-stadium">
    
    <!-- 👑 ওপরের অফিশিয়াল ডিসপ্লে বার (রেনবো গেমের অবিকল ব্যালেন্স বর্ম) -->
    <div class="bet365-navbar">
        <div class="bet365-back-btn" onclick="if(window.parent) window.parent.postMessage({action:'go_lobby'}, '*')">◀ LOBBY</div>
        <div class="bet365-brand-logo">BET365</div>
        <!-- 🎯 ওস্তাদ! কিলার ফিক্স—ওপরের ডানদিকের ডেডিকেটেড স্পোর্টস বাজি হিস্টোরি ট্রিগার বোতাম লক! -->
        <button class="bet365-history-trigger-btn" onclick="toggleSportsHistoryPanel(true)">HISTORY</button>
        <div class="bet365-balance-box">৳ <span id="user-balance">0.00</span></div>
    </div>

    <!-- 🏟️ [🔒 Bet365 অবিকল ৫-স্তর মাল্টি-স্পোর্টস ডাইনামিক নেভিগেশন মেনুবার কড়া লক 🔒] -->
    <div class="bet365-sports-nav-scroll">
        <button class="sports-nav-tab active" id="tab-live" onclick="switchSportsCategory('live')">🔴 LIVE 365</button>
        <button class="sports-nav-tab" id="tab-football" onclick="switchSportsCategory('football')">⚽ FOOTBALL</button>
        <button class="sports-nav-tab" id="tab-cricket" onclick="switchSportsCategory('cricket')">🏏 CRICKET</button>
        <button class="sports-nav-tab" id="tab-tennis" onclick="switchSportsCategory('tennis')">🎾 TENNIS</button>
        <button class="sports-nav-tab" id="tab-basketball" onclick="switchSportsCategory('basketball')">🏀 BASKETBALL</button>
    </div>

    <!-- 🎰 [🔒 থার্ড-পার্টি ডাটা ফিড থেকে আসা তাজা ম্যাচের মাল্টি-মার্কেট ডিসপ্লে গ্রিড কন্টেইনার কড়া লক 🔒] -->
    <div id="bet365-sports-grid" class="bet365-grid-wrapper">
        <div style="text-align: center; padding: 40px; color: #888; font-family: sans-serif; font-weight: bold;">
            ⏳ স্পোর্টস লাইভ ডাটা ফিড কানেক্ট হচ্ছে...
        </div>
    </div>

    <!-- 🔳 [🔒 বাজি ধরার পর মাল্টি-মার্কেট সহ গোল্ডেন বেট স্লিপ কনফার্মেশন মডাল পপআপ 🔒] -->
    <div id="bet365-slip-overlay" class="bet365-popup-overlay">
        <div class="bet365-popup-box">
            <div class="bet365-popup-title" id="slip-match-title">Real Madrid vs Barcelona</div>
            <div class="slip-market-badge" id="slip-market-name">Full Time Result (1X2)</div>
            <div class="slip-details-row">
                Selection: <span id="slip-selection" style="color: #ffdf00; font-weight: 950;">Home</span> 
                | Odds: <span id="slip-odds" style="color: #00ff66; font-weight: 950;">1.85</span>
            </div>
            <div class="slip-input-container">
                <input type="number" id="slip-bet-amount" value="100" min="10" placeholder="BDT Stake">
            </div>
            <div class="slip-btn-group">
                <button class="slip-cancel-btn" onclick="closeBet365SlipModal()">CANCEL</button>
                <button class="slip-confirm-btn" id="slip-submit-btn" onclick="confirmBet365Placement()">PLACE BET</button>
            </div>
        </div>
    </div>

    <!-- 📜 [🔒 ওস্তাদ! সম্পূর্ণ আলাদা এবং ডেডিকেটেড স্পোর্টস বেট হিস্টোরি স্লাইডিং প্যানেল বর্ম লক 🔒] -->
    <div id="sports-history-sidebar" class="sports-history-panel-overlay">
        <div class="sports-history-content-box">
            <div class="history-panel-header">
                <h3>📋 SPORTS BET HISTORY</h3>
                <button class="history-close-x-btn" onclick="toggleSportsHistoryPanel(false)">✕</button>
            </div>
            <div id="sports-history-log-list" class="history-log-scroll-area">
                <div style="text-align: center; padding: 20px; color: #aaa;">⏳ বাজি লগ লোড হচ্ছে...</div>
            </div>
        </div>
    </div>

</div>

<!-- 📢 Sockets নেটওয়ার্ক ও অন্য গেমের ইউনিভার্সাল ওতো-ড্রাইভার স্ক্রিপ্ট লজিক -->
<script src="/socket.io/socket.io.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
    const urlWallet = urlParams.get('wallet') || "main";
    
    const SERVER_URL = window.location.origin;

    let balance = 0.00;
    let isBetPlacing = false;
    let activeSlipData = null;
    let currentActiveCategory = 'live'; 
    let cachedGlobalMatches = [];

    // 🔌 সকেট ক্লায়েন্ট ইঞ্জিন কানেকশন গেটওয়ে
    const socket = io(SERVER_URL);

    // 🚀 [🔒 ওস্তাদ! অন্য গেমের অবিকল ১০০% সচল ওরিজিনাল ব্যালেন্স ড্রাইভার প্রোটোকল লক 🔒]
    async function fetchLiveBalance() {
        try {
            const response = await fetch(`${SERVER_URL}/api/rainbow-balance?userId=${urlUserId}&wallet=${urlWallet}`);
            const data = await response.json();
            if (data && data.success) {
                balance = parseFloat(data.balance);
                document.getElementById("user-balance").innerText = balance.toFixed(2);
            }
        } catch (e) { 
            console.error("Balance fetch delay handled"); 
        }
    }

    // 📊 [🔒 সকেট ডাটা বর্ম লক]: থার্ড-পার্টি সার্ভারে ডাটা চেঞ্জ হওয়া মাত্রই স্ক্রিনে কোনো ভিজ্যুয়াল জ্যাম ছাড়াই ওতো-আপডেট হবে!
    socket.on("bet365LiveOddsUpdate", (matches) => {
        cachedGlobalMatches = matches;
        renderBet365LuxuryOddsTable();
    });

    // 🔄 ৫টি স্পোর্টস ক্যাটাগরি মেনুবার ট্যাব সুইচিং অ্যালগরিদম ভাই ভাই
    function switchSportsCategory(categoryName) {
        currentActiveCategory = categoryName;
        
        // ওল্ড একটিভ ট্যাবের ক্লাস রিমুভ করে নতুন বোতাম হাইলাইট লক!
        document.querySelectorAll('.sports-nav-tab').forEach(btn => btn.classList.remove('active'));
        
        const targetTab = document.getElementById(`tab-${categoryName}`);
        if (targetTab) targetTab.classList.add('active');
        
        renderBet365LuxuryOddsTable();
    }

    // 🎰 [🔒 ফুটবল, ক্রিকেট, টেনিস, বাস্কেটবলের সব বেটিং মার্কেট ডাইনামিক রেন্ডারিং ইঞ্জিন লক 🔒]
    function renderBet365LuxuryOddsTable() {
        const container = document.getElementById("bet365-sports-grid");
        if (!container) return;

        // কারেন্ট ক্যাটাগরি অনুযায়ী ম্যাচ ডাটা ফিল্টারিং বর্ম
        let filteredMatches = cachedGlobalMatches;
        if (currentActiveCategory !== 'live') {
            filteredMatches = cachedGlobalMatches.filter(m => m.sport === currentActiveCategory);
        }

        if (!filteredMatches || filteredMatches.length === 0) {
            container.innerHTML = `<div style="text-align: center; padding: 40px; color: #888; font-family: sans-serif; font-weight: bold;">🏁 এই মুহূর্তে কোনো সচল ${currentActiveCategory.toUpperCase()} ম্যাচ নেই ওস্তাদ!</div>`;
            return;
        }

        let html = "";
        filteredMatches.forEach(m => {
            // ওস্তাদ! প্রতিটি খেলার জন্য আলাদা আলাদা বেটিং মার্কেট লেআউট কড়া লক!
            let marketsHTML = "";

            if (m.sport === 'football') {
                // ⚽ ফুটবলের জন্য: ম্যাচ উইনার (১X২), টোটাল ওভার/আন্ডার গোল, এবং ডাবল চান্স মার্কেট!
                marketsHTML = `
                    <div class="market-section-block">
                        <div class="market-header-title">Full Time Result (1X2)</div>
                        <div class="odds-row-buttons">
                            <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Time Result', 'Home (1)', ${m.odds.home})">1<br><span>${m.odds.home}</span></button>
                            <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Time Result', 'Draw (X)', ${m.odds.draw})">X<br><span>${m.odds.draw}</span></button>
                            <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Time Result', 'Away (2)', ${m.odds.away})">2<br><span>${m.odds.away}</span></button>
                        </div>
                        <div class="market-header-title" style="margin-top:8px;">Total Goals (Over/Under 2.5)</div>
                        <div class="odds-row-buttons">
                            <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Total Goals', 'Over 2.5', ${(m.odds.home * 1.1).toFixed(2)})">Over 2.5<br><span>${(m.odds.home * 1.1).toFixed(2)}</span></button>
                            <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Total Goals', 'Under 2.5', ${(m.odds.away * 1.2).toFixed(2)})">Under 2.5<br><span>${(m.odds.away * 1.2).toFixed(2)}</span></button>
                        </div>
                    </div>
                `;
            } else if (m.sport === 'cricket') {
                           // 🏏 ক্রিকেটের জন্য: ম্যাচ উইনার (১-২), টোটাল রান ১ম ইনিংস, এবং টোটাল ছক্কা মার্কেট!
            marketsHTML = `
                <div class="market-section-block">
                    <div class="market-header-title">Match Winner (1-2)</div>
                    <div class="odds-row-buttons">
                        <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Winner', '${m.teamHome}', ${m.odds.home})">1 (${m.teamHome})<br><span>${m.odds.home}</span></button>
                        <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Winner', '${m.teamAway}', ${m.odds.away})">2 (${m.teamAway})<br><span>${m.odds.away}</span></button>
                    </div>
                    <div class="market-header-title" style="margin-top:8px;">Total Sixes (Over/Under 12.5)</div>
                    <div class="odds-row-buttons">
                        <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Total Sixes', 'Over 12.5', 1.85)">Over 12.5<br><span>1.85</span></button>
                        <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Total Sixes', 'Under 12.5', 1.85)">Under 12.5<br><span>1.85</span></button>
                    </div>
                </div>
            `;
        } else {
            // 🎾 🏀 টেনিস ও বাস্কেটবলের জন্য: হেড-টু-হেড হ্যান্ডিক্যাপ ও পয়েন্ট স্প্রেড মার্কেট সিঙ্ক!
            marketsHTML = `
                <div class="market-section-block">
                    <div class="market-header-title">Head to Head Outright Winner</div>
                    <div class="odds-row-buttons">
                        <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Outright Winner', '${m.teamHome}', ${m.odds.home})">${m.teamHome}<br><span>${m.odds.home}</span></button>
                        <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Outright Winner', '${m.teamAway}', ${m.odds.away})">${m.teamAway}<br><span>${m.odds.away}</span></button>
                    </div>
                </div>
            `;
        }

        html += `
            <div class="bet365-luxury-match-card">
                <div class="luxury-card-meta-row">
                    <span class="meta-league-name">🏆 ${m.league}</span>
                    <span class="meta-match-timer">⏰ ${m.matchTime}</span>
                </div>
                <div class="luxury-teams-score-grid">
                    <div class="luxury-team-name">${m.teamHome}</div>
                    <div class="luxury-score-badge">${m.scoreHome}</div>
                    <div class="luxury-team-name">${m.teamAway}</div>
                    <div class="luxury-score-badge">${m.scoreAway}</div>
                </div>
                ${marketsHTML}
            </div>
        `;
    });
    container.innerHTML = html;
}

// 🔳 বেট স্লিপ মডাল ওপেন করার প্রফেশনাল মেকানিজম ভাই ভাই
function openBet365SlipModal(matchId, matchTitle, marketName, selection, oddsValue) {
    if (isBetPlacing) return;
    activeSlipData = { matchId, matchTitle, marketName, selection, odds: oddsValue };
    
    document.getElementById("slip-match-title").innerText = matchTitle;
    document.getElementById("slip-market-name").innerText = marketName;
    document.getElementById("slip-selection").innerText = selection;
    document.getElementById("slip-odds").innerText = oddsValue.toFixed(2);
    
    document.getElementById("bet365-slip-overlay").style.display = "flex";
}

function closeBet365SlipModal() {
    document.getElementById("bet365-slip-overlay").style.display = "none";
    activeSlipData = null;
}

// 🛫 বাজি ধরার ও ৩১১ নম্বর লাইনের ওরিজিনাল পিএইচপি ওয়ালেট গেটওয়ে থেকে টাকা কাটার কোর রিকোয়েস্ট পুশ ড্রাইভার
async function confirmBet365Placement() {
    if (isBetPlacing || !activeSlipData) return;

    const stakeInput = document.getElementById("slip-bet-amount");
    const betAmt = parseFloat(stakeInput.value);

    if (isNaN(betAmt) || betAmt < 10 || betAmt > 20000) {
        alert("❌ Invalid Stake Amount (৳১০ - ৳২০০০০)!");
        return;
    }

    if (balance < betAmt) {
        alert("❌ Insufficient Balance! Please Recharge BDT.");
        return;
    }

    isBetPlacing = true;
    const submitBtn = document.getElementById("slip-submit-btn");
    submitBtn.disabled = true;
    submitBtn.innerText = "PLACING... ⏳";

    try {
        // 🎰 [জিলির ওরিজিনাল বাজি কাটার রাউট সিঙ্ক হিট ভাই]
        const response = await fetch(`${SERVER_URL}/api/jili-bet`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: urlUserId,
                matchId: activeSlipData.matchId,
                marketName: activeSlipData.marketName,
                selection: activeSlipData.selection,
                odds: activeSlipData.odds,
                amount: betAmt,
                wallet: urlWallet
            })
        });

        const result = await response.json();

        if (result.success === true) {
            balance = parseFloat(result.balance);
            document.getElementById("user-balance").innerText = balance.toFixed(2);
            
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");
            
            alert(result.message || "🎯 Bet accepted! Good Luck.");
            closeBet365SlipModal();
            fetchSportsBetHistoryLog(); 
        } else {
            alert(result.message || "❌ Bet Declined!");
        }
    } catch (err) {
        alert("⚠️ সেশন আউট! আবার বাজি প্লে করুন ওস্তাদ ভাই ভাই।");
    } finally {
        isBetPlacing = false;
        submitBtn.disabled = false;
        submitBtn.innerText = "PLACE BET";
    }
}

// 📜 [🔒 ওস্তাদ! আলাদা ডেডিকেটেড স্পোর্টস হিস্টোরি স্লাইডিং মডাল কন্ট্রোলার 🔒]
function toggleSportsHistoryPanel(showPanel) {
    const sidebar = document.getElementById("sports-history-sidebar");
    if (sidebar) {
        sidebar.style.display = showPanel ? "flex" : "none";
        if (showPanel) fetchSportsBetHistoryLog();
    }
}

// 📋 স্পোর্টস এপিআই গেটওয়ে থেকে প্লেয়ারের ডেডিকেটেড বাজি হিস্টোরি রিড মেকানিজম ভাই ভাই
async function fetchSportsBetHistoryLog() {
    const historyListContainer = document.getElementById("sports-history-log-list");
    if (!historyListContainer) return;

    try {
        const response = await fetch(`${SERVER_URL}/api/sportsbook/bet-history?userId=${urlUserId}`);
        const data = await response.json();

        if (data && data.success && data.history.length > 0) {
            let logHTML = "";
            data.history.reverse().forEach(log => {
                logHTML += `
                    <div class="history-log-card-item">
                        <div class="log-match-title">⚽ ${log.matchTitle}</div>
                        <div class="log-market-sub">${log.marketName} | Pick: <b style="color:#ffdf00;">${log.selection}</b></div>
                        <div class="log-data-row-flex">
                            <span>Odds: <b>${log.odds.toFixed(2)}</b></span>
                            <span>Stake: <b style="color:#00ff66;">৳${log.stake.toFixed(2)}</b></span>
                        </div>
                        <div class="log-payout-row">
                            <span>Est. Payout: <b>৳${log.potentialPayout.toFixed(2)}</b></span>
                            <span class="log-status-badge status-running">${log.status}</span>
                        </div>
                    </div>
                `;
            });
            historyListContainer.innerHTML = logHTML;
        } else {
            historyListContainer.innerHTML = `<div style="text-align: center; padding: 40px; color: #888;">📊 আপনার কোনো স্পোর্টস বাজি রেকর্ড নেই ওস্তাদ!</div>`;
        }
    } catch (e) {
        historyListContainer.innerHTML = `<div style="text-align: center; padding: 20px; color: #ff003c;">⚠️ হিস্টোরি লোড এরর!</div>`;
    }
}

// 🚀 [🔒 ওস্তাদ! অন্য গেমের অবিকল ১০০% খাঁটি রিয়েল-টাইম সকেট ব্যালেন্স রিফ্রেশার ইঞ্জিন লক 🔒]
socket.on("balanceUpdate", (data) => {
    if (data && data.username === urlUserId) {
        if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
        if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");
        fetchLiveBalance();
    }
});

// ওতো-বুটস্ট্র্যাপ মেমোরি ইন্টারফেস বুট সিঙ্ক
window.onload = () => {
    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
    fetchLiveBalance();
    setTimeout(fetchLiveBalance, 400);
    setTimeout(fetchLiveBalance, 900);
};
</script>
</body>
</html>
