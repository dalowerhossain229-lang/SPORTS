<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bet365 Premium Sportsbook - VIP CASINO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bet365-stadium">
    
    <!-- 👑 ওপরের অফিশিয়াল ডিসপ্লে বার (রেনবো গেমের অবিকল ব্যালেন্স বর্ম) -->
    <div class="bet365-navbar">
        <div class="bet365-back-btn" onclick="if(window.parent) window.parent.postMessage({action:'go_lobby'}, '*')">◀ LOBBY</div>
        <div class="bet365-brand-logo">BET365 SPORTSBOOK</div>
        <!-- 🎯 ওস্তাদ! কিলার ফিক্স—আপনার অন্য সচল গেমের ওরিজিনাল ওয়ালেট ডিসপ্লে আইডি 'user-balance' এখানে ১০০% কড়া লক! -->
        <div class="bet365-balance-box">BALANCE: ৳ <span id="user-balance">0.00</span></div>
    </div>

    <!-- 🏟️ মেইন লাইভ ম্যাচ ক্যাটাগরি ব্যানার এরিয়া -->
    <div class="bet365-live-banner">
        <span class="live-blink-dot">🔴</span> In-Play Live Betting Arena
    </div>

    <!-- 🎰 [🔒 ওস্তাদ! থার্ড-পার্টি ডাটা ফিড থেকে আসা তাজা ম্যাচের ১X২ ডিসপ্লে গ্রিড কন্টেইনার কড়া লক 🔒] -->
    <div id="bet365-sports-grid" class="bet365-grid-wrapper">
        <div style="text-align: center; padding: 40px; color: #888; font-family: sans-serif; font-weight: bold;">
            ⏳ থার্ড-পার্টি লাইভ ডাটা ফিড কানেক্ট হচ্ছে...
        </div>
    </div>

    <!-- 🔳 [🔒 বাজি ধরার পর গোল্ডেন বেট স্লিপ কনফার্মেশন মডাল পপআপ 🔒] -->
    <div id="bet365-slip-overlay" class="bet365-popup-overlay">
        <div class="bet365-popup-box">
            <div class="bet365-popup-title" id="slip-match-title">Real Madrid vs Barcelona</div>
            <div class="slip-details-row">
                Selection: <span id="slip-selection" style="color: #ffdf00; font-weight: 950;">Home</span> 
                | Odds: <span id="slip-odds" style="color: #00ff66; font-weight: 950;">1.85</span>
            </div>
            <div class="slip-input-container">
                <input type="number" id="slip-bet-amount" value="100" min="10" placeholder="BDT Stake">
            </div>
            <div class="slip-btn-group">
                <button class="slip-cancel-btn" onclick="closeBet365SlipModal()">CANCEL</button>
                <button class="slip-confirm-btn" id="slip-submit-btn" onclick="confirmBet365Placement()">PLACE BET</button>
            </div>
        </div>
    </div>

</div>

<!-- 📢 Sockets নেটওয়ার্ক ও অন্য গেমের ইউনিভার্সাল ওতো-ড্রাইভার স্ক্রিপ্ট লজিক -->
<script src="/socket.io/socket.io.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
    const urlWallet = urlParams.get('wallet') || "main";
    
    const SERVER_URL = window.location.origin;

    let balance = 0.00;
    let isBetPlacing = false;
    let activeSlipData = null;

    // 🔌 সকেট ক্লায়েন্ট ইঞ্জিন কানেকশন গেটওয়ে
    const socket = io(SERVER_URL);

    // 🚀 [🔒 ওস্তাদ! অন্য গেমের অবিকল ১০০% সচল ওরিজিনাল ব্যালেন্স ড্রাইভার প্রোটোকল লক 🔒]
    async function fetchLiveBalance() {
        try {
            const response = await fetch(`${SERVER_URL}/api/rainbow-balance?userId=${urlUserId}&wallet=${urlWallet}`);
            const data = await response.json();
            if (data && data.success) {
                balance = parseFloat(data.balance);
                document.getElementById("user-balance").innerText = balance.toFixed(2);
            }
        } catch (e) { 
            console.error("Balance fetch delay"); 
        }
    }

    // 📊 [🔒 সকেট ডাটা বর্ম লক]: থার্ড-পার্টি সার্ভারে ডাটা চেঞ্জ হওয়া মাত্রই স্ক্রিনে কোনো ভিজ্যুয়াল জ্যাম ছাড়া ওতো-আপডেট হবে!
    socket.on("bet365LiveOddsUpdate", (matches) => {
        renderBet365LuxuryOddsTable(matches);
    });

    function renderBet365LuxuryOddsTable(matches) {
        const container = document.getElementById("bet365-sports-grid");
        if (!container) return;
        
        if (!matches || matches.length === 0) {
            container.innerHTML = `<div style="text-align: center; padding: 40px; color: #888; font-family: sans-serif;">🏁 এই মুহূর্তে কোনো লাইভ ম্যাচ সচল নেই ওস্তাদ!</div>`;
            return;
        }

        let html = "";
        matches.forEach(m => {
            // Bet365 স্টাইলে লাক্সারি ডার্ক নিয়ন রো গ্রিড ডিজাইন লেআউট সিঙ্ক ভাই ভাই!
            html += `
                <div class="bet365-match-card">
                    <div class="teams-zone">
                        <div class="league-tag">${m.league} - <span class="time-blink">${m.matchTime}</span></div>
                        <div class="team-row">${m.teamHome} <span class="score-num">${m.scoreHome}</span></div>
                        <div class="team-row">${m.teamAway} <span class="score-num">${m.scoreAway}</span></div>
                    </div>
                    <div class="odds-zone">
                        <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', '1', ${m.odds.home})">1<br><span>${m.odds.home}</span></button>
                        <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'X', ${m.odds.draw})">X<br><span>${m.odds.draw}</span></button>
                        <button class="odds-bet-btn" onclick="openBet365SlipModal('${m.matchId}', '${m.teamHome} vs ${m.teamAway}', '2', ${m.odds.away})">2<br><span>${m.odds.away}</span></button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // 🔳 বেট স্লিপ মডাল ওপেন করার কিংস মেকানিজম ভাই ভাই
    function openBet365SlipModal(matchId, matchTitle, selection, oddsValue) {
        if (isBetPlacing) return;
        activeSlipData = { matchId, matchTitle, selection, odds: oddsValue };
        
        document.getElementById("slip-match-title").innerText = matchTitle;
        document.getElementById("slip-selection").innerText = selection === '1' ? 'Home' : (selection === '2' ? 'Away' : 'Draw');
        document.getElementById("slip-odds").innerText = oddsValue.toFixed(2);
        
        document.getElementById("bet365-slip-overlay").style.display = "flex";
    }

    function closeBet365SlipModal() {
        document.getElementById("bet365-slip-overlay").style.display = "none";
        activeSlipData = null;
    }

    // 🛫 বাজি ধরার ও ৩১১ নম্বর লাইনের ওরিজিনাল পিএইচপি ওয়ালেট গেটওয়ে থেকে টাকা কাটার কোর রিকোয়েস্ট পুশ ড্রাইভার
    async function confirmBet365Placement() {
        if (isBetPlacing || !activeSlipData) return;

        const stakeInput = document.getElementById("slip-bet-amount");
        const betAmt = parseFloat(stakeInput.value);

        if (isNaN(betAmt) || betAmt < 10 || betAmt > 20000) {
            alert("❌ Invalid Stake Amount (৳১০ - ৳২০০০০)!");
            return;
        }

        if (balance < betAmt) {
            alert("❌ Insufficient Balance! Please Recharge BDT.");
            return;
        }

        isBetPlacing = true;
        const submitBtn = document.getElementById("slip-submit-btn");
        submitBtn.disabled = true;
        submitBtn.innerText = "PLACING... ⏳";

        try {
            // 🎰 [জিলির ওরিজিনাল বাজি কাটার রাউট সিঙ্ক হিট ভাই]
            const response = await fetch(`${SERVER_URL}/api/jili-bet`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: urlUserId,
                    matchId: activeSlipData.matchId,
                    selection: activeSlipData.selection,
                    odds: activeSlipData.odds,
                    amount: betAmt,
                    wallet: urlWallet
                })
            });

            const result = await response.json();

            if (result.success === true) {
                balance = parseFloat(result.balance);
                document.getElementById("user-balance").innerText = balance.toFixed(2);
                
                // মেইন ড্যাশবোর্ড ওয়ালেট ওতো-রিফ্রেশার পোস্ট মেসেজ সিঙ্ক
                if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");
                
                alert(result.message || "🎯 Bet accepted! Good Luck.");
                closeBet365SlipModal();
            } else {
                alert(result.message || "❌ Bet Declined!");
            }
        } catch (err) {
            alert("⚠️ সেশন আউট! আবার বাজি প্লে করুন ওস্তাদ ভাই ভাই।");
        } finally {
            isBetPlacing = false;
            submitBtn.disabled = false;
            submitBtn.innerText = "PLACE BET";
        }
    }

    // 🚀 [🔒 ওস্তাদ! অন্য গেমের অবিকল ১০০% খাঁটি রিয়েল-টাইม সকেট ব্যালেন্স রিফ্রেশার ইঞ্জিন লক 🔒]
    socket.on("balanceUpdate", (data) => {
        if (data && data.username === urlUserId) {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
        }
    });

    // ওতো-বুটস্ট্র্যাপ মেমোরি ইন্টারফেস বুট সিঙ্ক
    window.onload = () => {
        if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
        fetchLiveBalance();
        // ব্যাকআপ সিঙ্ক ট্র্যাকার ২ বার ওতো-রিফ্রেশ ফায়ার ওস্তাদ ভাই ভাই!
        setTimeout(fetchLiveBalance, 400);
        setTimeout(fetchLiveBalance, 900);
    };
</script>
</body>
</html>
