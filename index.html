<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bet365 Premium Multi-Sportsbook - VIP CASINO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bet365-stadium">
    
    <!-- 🏟️ [🔒 Bet365 অবিকল ৪-কলাম মাল্টি-স্পোর্টস ডাইনামিক হরাইজন্টাল নেভিগেশন মেনুবার 🔒] -->
    <div class="bet365-sports-nav-scroll">
        <button class="sports-nav-tab active" id="tab-live" onclick="switchSportsCategory('live')">🔴 LIVE SPORTS</button>
        <button class="sports-nav-tab" id="tab-cricket" onclick="switchSportsCategory('cricket')">🏏 CRICKET</button>
        <button class="sports-nav-tab" id="tab-football" onclick="switchSportsCategory('football')">⚽ FOOTBALL</button>
        <button class="sports-nav-tab" id="tab-tennis" onclick="switchSportsCategory('tennis')">🎾 TENNIS</button>
    </div>

    <!-- 📥 [🔒 ওস্তাদ! খাতার পৃষ্ঠা ১ অনুসারী LIVE SPORTS এর ভেতরের ৩টি সাব-অপশন প্যানেল বর্ম 🔒] -->
    <div id="live-sports-sub-bar" class="cricket-formats-sub-nav" style="display: flex;">
        <button class="cricket-format-btn active" id="live-sub-all" onclick="filterLiveSportsSub('all')">ALL LIVE</button>
        <button class="cricket-format-btn" id="live-sub-cricket" onclick="filterLiveSportsSub('cricket')">CRICKET LIVE</button>
        <button class="cricket-format-btn" id="live-sub-football" onclick="filterLiveSportsSub('football')">FOOTBALL LIVE</button>
        <button class="cricket-format-btn" id="live-sub-tennis" onclick="filterLiveSportsSub('tennis')">TENNIS LIVE</button>
    </div>

    <!-- 🎰 [🔒 থার্ড-পার্টি ডাটা ফিড থেকে আসা তাজা ম্যাচের ১X২ ডিসপ্লে গ্রিড কন্টেইনার কড়া锁 🔒] -->
    <div id="bet365-sports-grid" class="bet365-grid-wrapper">
        <div style="text-align: center; padding: 40px; color: #888; font-family: sans-serif; font-weight: bold;">
            ⏳ স্পোর্টস লাইভ ডাটা ফিড কানেক্ট হচ্ছে...
        </div>
    </div>

    <!-- 🔳 [🔒 বাজি ধরার পর গোল্ডেন বেট স্লিপ কনফার্মেশন মডাল পপআপ 🔒] -->
    <div id="bet365-slip-overlay" class="bet365-popup-overlay">
        <div class="bet365-popup-box">
            <div class="bet365-popup-title" id="slip-match-title">Real Madrid vs Barcelona</div>
            <div class="slip-market-badge" id="slip-market-name">Match Winner</div>
            <div class="slip-details-row">
                Selection: <span id="slip-selection" style="color: #ffdf00; font-weight: 950;">Home</span> 
                | Odds: <span id="slip-odds" style="color: #00ff66; font-weight: 950;">1.85</span>
            </div>
            <div class="slip-input-container">
                <input type="number" id="slip-bet-amount" value="100" min="10" placeholder="BDT Stake">
            </div>
            <div class="slip-btn-group">
                <button class="slip-cancel-btn" onclick="closeBet365SlipModal(event)">CANCEL</button>
                <button class="slip-confirm-btn" id="slip-submit-btn" onclick="confirmBet365Placement()">PLACE BET</button>
            </div>
        </div>
    </div>

    <!-- 📜 [🔒 আলাদা ডেডিকেটেড স্পোর্টস বেট হিস্টোরি স্লাইডিং প্যানেল 🔒] -->
    <div id="sports-history-sidebar" class="sports-history-panel-overlay">
        <div class="sports-history-content-box">
            <div class="history-panel-header">
                <h3>📋 SPORTS BET HISTORY</h3>
                <button class="history-close-x-btn" onclick="toggleSportsHistoryPanel(event, false)">✕</button>
            </div>
            <div id="sports-history-log-list" class="history-log-scroll-area">
                <div style="text-align: center; padding: 20px; color: #aaa;">⏳ বাজি লগ লোড হচ্ছে...</div>
            </div>
        </div>
    </div>

    <!-- 🔲 [🔒 ওস্তাদ! নিচে সাদা মার্ক করা জায়গায় ডেডিকেটেড ফিক্সড Betslip বাটন বর্ম লক 🔒] -->
    <div class="bet365-footer-betslip-bar" onclick="toggleSportsHistoryPanel(event, true)">
        <div class="betslip-btn-content">
            <span class="betslip-icon">📋</span>
            <span class="betslip-text">BET SLIP / LIVE CASHOUT</span>
        </div>
    </div>

</div>

<!-- 📢 Sockets নেটওয়ার্ক ও ইউনিভার্সাল ওতো-ড্রাইভার স্ক্রিপ্ট লজিক -->
<script src="/socket.io/socket.io.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
    const urlWallet = urlParams.get('wallet') || "main";
    
    const SERVER_URL = window.location.origin;

    let balance = 0.00;
    let isBetPlacing = false;
    let activeSlipData = null;
    let currentActiveCategory = 'live'; 
    let currentLiveSportsSub = 'all'; 
    let cachedGlobalMatches = [];
    let expandedMatchesMap = {}; // এক্সপ্যান্ডেবল স্টেট ডিক্লেয়ারেশন লক ভাই!

    const socket = io({
        transports: ['websocket', 'polling'],
        upgrade: true
    });

    async function fetchLiveBalance() {
        try {
            const response = await fetch(`${SERVER_URL}/api/rainbow-balance?userId=${urlUserId}&wallet=${urlWallet}`);
            const data = await response.json();
            if (data && data.success) {
                balance = parseFloat(data.balance);
            }
        } catch (e) { console.error("Balance fetch locked handled"); }
    }

    socket.on("bet365LiveOddsUpdate", (matches) => {
        cachedGlobalMatches = matches;
        renderBet365LuxuryOddsTable(cachedGlobalMatches);
    });

    function switchSportsCategory(categoryName) {
        currentActiveCategory = categoryName;
        document.querySelectorAll('.sports-nav-tab').forEach(btn => btn.classList.remove('active'));
        
        const targetTab = document.getElementById(`tab-${categoryName}`);
        if (targetTab) targetTab.classList.add('active');
        
        const subBar = document.getElementById("live-sports-sub-bar");
        if (subBar) {
            subBar.style.display = (categoryName === 'live') ? "flex" : "none";
        }
        
        currentLiveSportsSub = 'all'; 
        document.querySelectorAll('.cricket-format-btn').forEach(btn => btn.classList.remove('active'));
        const defaultSub = document.getElementById("live-sub-all");
        if (defaultSub) defaultSub.classList.add('active');

        renderBet365LuxuryOddsTable(cachedGlobalMatches);
    }

    function filterLiveSportsSub(subName) {
        currentLiveSportsSub = subName;
        document.querySelectorAll('.cricket-format-btn').forEach(btn => btn.classList.remove('active'));
        
        const targetSubTab = document.getElementById(`live-sub-${subName}`);
        if (targetSubTab) targetSubTab.classList.add('active');
        
        renderBet365LuxuryOddsTable(cachedGlobalMatches);
    }

    // 🎰 [🔒 ওস্তাদ! খাতার ৪টি পাতার অবিকল ৩-গেম এক্সপ্যান্ডেবল মার্কেট রেন্ডারিং মাস্টার ইঞ্জিন লক 🔒]
     জন্য স্ট্যান্ডার্ড স্কোর ডিসপ্লে
     
    function renderBet365LuxuryOddsTable(matches) {
    const container = document.getElementById("bet365-sports-grid");
    if (!container) return;

    let filteredMatches = matches || [];
    
    // কারেন্ট অ্যাক্টিভ ক্যাটাগরি এবং লাইভ সাব-ফিল্টার অনুযায়ী ডাটা সেপারেশন
    if (currentActiveCategory !== 'live') {
        filteredMatches = filteredMatches.filter(m => m.sport === currentActiveCategory);
    } else if (currentLiveSportsSub !== 'all') {
        filteredMatches = filteredMatches.filter(m => m.sport === currentLiveSportsSub);
    }

    if (!filteredMatches || filteredMatches.length === 0) {
        container.innerHTML = `<div style="text-align: center; padding: 40px; color: #888; font-family: sans-serif; font-weight: bold;">🏁 এই মুহূর্তে কোনো সচল ${currentActiveCategory.toUpperCase()} ম্যাচ নেই ওস্তাদ!</div>`;
        return;
    }

    let html = "";
    filteredMatches.forEach(m => {
        const isExpanded = !!expandedMatchesMap[m.matchId];
        let scoreAndTeamsHTML = "";
        let frontOddsHTML = "";
        let expandedSectionHTML = "";

        const odds = m.odds || {};
        const mFormat = String(m.matchFormat || '').toLowerCase();

        // ==================== [১ নম্বর খাতার পাতা: FOOTBALL ENGINE] ====================
        if (m.sport === 'football') {
            // বাঁদিকের টিম ও লাইভ স্কোর কলাম
            scoreAndTeamsHTML = `
                <div class="b365-teams-info-block">
                    <div class="b365-tournament-title">🏆 ${m.league || 'Tournament'}</div>
                    <div class="b365-team-score-row"><span>⚽ ${m.teamHome}</span> <b class="b365-score-num">${m.scoreHome ?? 0}</b></div>
                    <div class="b365-team-score-row" style="margin-top:2px;"><span>⚽ ${m.teamAway}</span> <b class="b365-score-num">${m.scoreAway ?? 0}</b></div>
                </div>
            `;
            // ডানদিকের ১, X, ২ ফ্রন্ট বাটন গ্রিড
            const fTime = odds.fullTimeResult || { home: 1.85, draw: 3.20, away: 2.15 };
            frontOddsHTML = `
                <div class="b365-front-odds-grid triplet">
                    <button class="b365-odd-action-btn" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Time Result', 'Home (1)', ${fTime.home})"><b>${fTime.home}</b></button>
                    <button class="b365-odd-action-btn" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Time Result', 'Draw (X)', ${fTime.draw})"><b>${fTime.draw}</b></button>
                    <button class="b365-odd-action-btn" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Time Result', 'Away (2)', ${fTime.away})"><b>${fTime.away}</b></button>
                </div>
            `;

            // [১ ও ২ নম্বর খাতার পাতা: ফুটবল এক্সপ্যান্ডেড সাব-মার্কেটস]
            if (isExpanded) {
                const dChance = odds.doubleChance || { homeDraw: 1.25, awayDraw: 1.35 };
                const mGoal = odds.matchGoal?.line1_5 || { over: 1.90, under: 1.90 };
                const mCorners = odds.matchCorners || {};
                const nCards = odds.numberOfCards || { over1_5: 1.85, under1_5: 1.85 };

                expandedSectionHTML = `
                    <div class="b365-expanded-box-panel">
                        <!-- Full Time Result Table -->
                        <div class="b365-market-block-group">
                            <div class="b365-expanded-market-header">Full time result</div>
                            <div class="b365-odds-row-flex">
                                <button class="b365-odd-action-btn long" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Time Result', 'Team 1 Win', ${fTime.home})"><span>Team 1 Win</span> <b>${fTime.home}</b></button>
                                <button class="b365-odd-action-btn long" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Time Result', 'Draw', ${fTime.draw})"><span>Draw</span> <b>${fTime.draw}</b></button>
                                <button class="b365-odd-action-btn long" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Full Time Result', 'Team 2 Win', ${fTime.away})"><span>Team 2 Win</span> <b>${fTime.away}</b></button>
                            </div>
                        </div>
                        <!-- Double Chance Table -->
                        <div class="b365-market-block-group" style="margin-top:8px;">
                            <div class="b365-expanded-market-header">Double chance</div>
                            <div class="b365-odds-row-flex">
                                <button class="b365-odd-action-btn long" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Double Chance', 'Team 1 or Draw', ${dChance.homeDraw})"><span>Team 1 or Draw</span> <b>${dChance.homeDraw}</b></button>
                                <button class="b365-odd-action-btn long" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Double Chance', 'Team 2 or Draw', ${dChance.awayDraw})"><span>Team 2 or Draw</span> <b>${dChance.awayDraw}</b></button>
                            </div>
                        </div>
                        <!-- Match Goal Table -->
                        <div class="b365-market-block-group" style="margin-top:8px;">
                            <div class="b365-expanded-market-header">Match goal</div>
                            <div class="b365-table-grid-header"><span>Goal 1.5</span> <span>Over</span> <span>Under</span></div>
                            <div class="b365-table-grid-row">
                                <span class="b365-lbl-txt">Total 1.5</span>
                                <button class="b365-odd-action-btn" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Goal', 'Over 1.5', ${mGoal.over})"><b>${mGoal.over}</b></button>
                                <button class="b365-odd-action-btn" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Goal', 'Under 1.5', ${mGoal.under})"><b>${mGoal.under}</b></button>
                            </div>
                        </div>
                        <!-- Match Corners Table (২ নম্বর পাতা) -->
                        <div class="b365-market-block-group" style="margin-top:8px;">
                            <div class="b365-expanded-market-header">Match Corners</div>
                            <div class="b365-table-grid-header standard-4col"><span>Corners</span> <span>Over</span> <span>Exactly</span> <span>Under</span></div>
                            ${[6, 7, 8, 9].map(num => {
                                const cLine = mCorners[`line${num}`] || { over: 1.85, exactly: 3.20, under: 1.95 };
                                return `
                                    <div class="b365-table-grid-row standard-4col">
                                        <span class="b365-lbl-txt font-950">${num}</span>
                                        <button class="b365-odd-action-btn" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Corners', '${num} Over', ${cLine.over})"><b>${cLine.over}</b></button>
                                        <button class="b365-odd-action-btn" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Corners', '${num} Exactly', ${cLine.exactly})"><b>${cLine.exactly}</b></button>
                                        <button class="b365-odd-action-btn" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Corners', '${num} Under', ${cLine.under})"><b>${cLine.under}</b></button>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <!-- Number of Cards Table (২ নম্বর পাতা) -->
                        <div class="b365-market-block-group" style="margin-top:8px;">
                            <div class="b365-expanded-market-header">Number of cards</div>
                            <div class="b365-table-grid-header"><span>Cards</span> <span>Over</span> <span>Under</span></div>
                            <div class="b365-table-grid-row">
                                <span class="b365-lbl-txt">Line 1.5</span>
                                <button class="b365-odd-action-btn" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Number of Cards', 'Over 1.5', ${nCards.over1_5})"><b>${nCards.over1_5}</b></button>
                                <button class="b365-odd-action-btn" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Number of Cards', 'Under 1.5', ${nCards.under1_5})"><b>${nCards.under1_5}</b></button>
                            </div>
                        </div>
                    </div>
                `;
            }

        // ==================== [৩ ও ৪ নম্বর খাতার পাতা: CRICKET ENGINE] ====================
        } else if (m.sport === 'cricket') {
            // 🏏 ক্রিকেটের ৪টি ফরম্যাটের (T20, T10, ODI, TEST) মেগা ইঞ্জিন লক ওস্তাদ!
            const mFormat = m.matchFormat ? String(m.matchFormat).toLowerCase() : 't20';
            
            // খাতার ৩ ও ৪ নম্বর পাতা অনুসারে স্কোর ও টিম লেআউট
            scoreDisplayHTML = `
                <div class="luxury-teams-score-grid" style="color:#fff; padding:6px 0;">
                    <div style="display:flex; justify-content:space-between;">
                        <span class="luxury-team-name">🏏 ${m.teamHome}</span>
                        <b class="luxury-score-badge" style="color:#ffdf00;">${m.scoreHome ?? 0}</b>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-top:2px;">
                        <span class="luxury-team-name">🏏 ${m.teamAway}</span>
                        <b class="luxury-score-badge" style="color:#ffdf00;">${m.scoreAway ?? 0}</b>
                    </div>
                </div>
            `;

            // টেস্টের জন্য ৩-বাটন, ওয়ানডে/টি২০/টি১০ এর জন্য ২-বাটন ফ্রন্ট ডিসপ্লে
            if (mFormat === 'test') {
                const w3way = odds.matchWinner3Way || { home: 2.10, draw: 3.50, away: 2.20 };
                mainOddsButtonsHTML = `
                    <div class="bet365-odds-actions-grid triplet" style="display:flex; gap:4px; width:140px;">
                        <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Winner 3-Way', '1', ${w3way.home})">1<br><span>${w3way.home}</span></button>
                        <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Winner 3-Way', 'X', ${w3way.draw})">X<br><span>${w3way.draw}</span></button>
                        <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Winner 3-Way', '2', ${w3way.away})">2<br><span>${w3way.away}</span></button>
                    </div>
                `;
            } else {
                const cWin = odds.matchWinner2Way || { home: 1.85, away: 1.85 };
                mainOddsButtonsHTML = `
                    <div class="bet365-odds-actions-grid doublet" style="display:flex; gap:4px; width:92px;">
                        <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Winner 2-Way', 'Team 1', ${cWin.home})">1<br><span>${cWin.home}</span></button>
                        <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Match Winner 2-Way', 'Team 2', ${cWin.away})">2<br><span>${cWin.away}</span></button>
                    </div>
                `;
            }

            // এক্সপ্যান্ড করলে খাতার ৩ ও ৪ পাতার সাব-মার্কেটসমূহ আসবে
            if (isExpanded) {
                let innerCricket = "";
                if (mFormat === 't20' || mFormat === 't10') {
                    const pplay = odds.t20PowerplayRuns?.line48_5 || { over: 1.85, under: 1.85 };
                    innerCricket = `
                        <div class="b365-market-sub-title" style="color:#00ffaa; font-size:11px; margin-top:8px;">💥 T20/T10 Powerplay Runs (Line 48.5)</div>
                        <div style="display:flex; gap:4px; margin-top:4px;">
                            <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Powerplay Runs', 'Over 48.5', ${pplay.over})">Over 48.5<br><span>${pplay.over}</span></button>
                            <button class="odds-bet-btn" style="flex:1;" onclick="openBet365SlipModal(event, '${m.matchId}', '${m.teamHome} vs ${m.teamAway}', 'Powerplay Runs', 'Under 48.5', ${pplay.under})">Under 48.5<br><span>${pplay.under}</span></button>
                        </div>
                    `;
                } else if (mFormat === 'odi' || mFormat === 'oneday') {
                    const nextOver = odds.nextOverRuns || { over9_5: 1.85, under9_5: 1.85 };
                    const oddEven = odds.nextOverRunOddEven || { odd: 1.90, even: 1.90 };
                    const nextWicket = odds.nextOverTeamsWicket || { yes: 3.50, no: 1.25 };
                    const teamRuns = odds.team1Total50OversRuns || { over321_5: 1.83, under321_5: 1.83 };
                    const runs10Over = odds.runsInFirst10Overs || { over30: 1.83, under30: 1.83 };

                    innerCricket = `
                        <div class="b365-market-sub-title" style="color:#00ffaa; font-size:11px; margin-top:8px;">🏏 Next Over Runs Team 1/2 (Line 9.5)</div>
                        <div style="display:flex; gap:4px; margin-top:4px;">

// ==================== গোল্ডেন বেট স্লিপ কন্ট্রোলার মেকানিজম ====================
function openBet365SlipModal(event, matchId, matchTitle, marketName, selection, oddsValue) {
    if (event && event.stopPropagation) {
        event.stopPropagation();
    } else if (window.event) {
        window.event.stopPropagation();
    }

    if (isBetPlacing) return;

    activeSlipData = { matchId, matchTitle, marketName, selection, odds: parseFloat(oddsValue) };
    
    document.getElementById("slip-match-title").innerText = matchTitle;
    document.getElementById("slip-market-name").innerText = marketName;
    document.getElementById("slip-selection").innerText = selection;
    document.getElementById("slip-odds").innerText = parseFloat(oddsValue).toFixed(2); 
    document.getElementById("bet365-slip-overlay").style.display = "flex";
}

function closeBet365SlipModal(event) {
    if (event && event.stopPropagation) {
        event.stopPropagation();
    } else if (window.event) {
        window.event.stopPropagation();
    }
    document.getElementById("bet365-slip-overlay").style.display = "none";
    activeSlipData = null;
}

async function confirmBet365Placement() {
    if (isBetPlacing || !activeSlipData) return;
    const stakeInput = document.getElementById("slip-bet-amount");
    const betAmt = parseFloat(stakeInput.value);

    if (isNaN(betAmt) || betAmt < 10 || betAmt > 20000) {
        alert("❌ Invalid Stake Amount (৳১০ - ৳২০০০০)!");
        return;
    }

    isBetPlacing = true;
    const submitBtn = document.getElementById("slip-submit-btn");
    submitBtn.disabled = true;
    submitBtn.innerText = "PLACING... ⏳";

    try {
        const response = await fetch(`${SERVER_URL}/api/jili-bet`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: urlUserId, matchId: activeSlipData.matchId, marketName: activeSlipData.marketName,
                selection: activeSlipData.selection, odds: activeSlipData.odds, amount: betAmt, wallet: urlWallet
            })
        });

        const result = await response.json();
        if (result.success === true) {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            alert(result.message || "🎯 Bet accepted! Good Luck.");
            closeBet365SlipModal();
            if (typeof fetchSportsBetHistoryLog === 'function') fetchSportsBetHistoryLog(); 
        } else {
            alert(result.message || "❌ Bet Declined!");
        }
    } catch (err) {
        alert("⚠️ সেশন আউট! আবার বাজি প্লে করুন ওস্তাদ ভাই ভাই।");
    } finally {
        isBetPlacing = false;
        submitBtn.disabled = false;
        submitBtn.innerText = "PLACE BET";
    }
}

// ==================== স্পোর্টস বেট হিস্টোরি ও ক্যাশআউট মেকানিজম ====================
function toggleSportsHistoryPanel(event, showPanel) {
    if (event && event.stopPropagation) {
        event.stopPropagation();
    } else if (window.event) {
        window.event.stopPropagation();
    }

    const sidebar = document.getElementById("sports-history-sidebar");
    if (sidebar) {
        sidebar.style.display = showPanel ? "flex" : "none";
        if (showPanel) fetchSportsBetHistoryLog();
    }
}

async function fetchSportsBetHistoryLog() {
    const historyListContainer = document.getElementById("sports-history-log-list");
    if (!historyListContainer) return;
    try {
        const response = await fetch(`${SERVER_URL}/api/sportsbook/bet-history?userId=${urlUserId}`);
        const data = await response.json();
        if (data && data.success && data.history && data.history.length > 0) {
            let logHTML = "";
            data.history.reverse().forEach(log => {
                let cashoutButtonHTML = "";
                const stakeValue = parseFloat(log.stake || 0);
                const oddsValue = parseFloat(log.odds || 0);
                const payoutValue = parseFloat(log.potentialPayout || 0);

                                    if (log.status === "RUNNING") {
                        let currentCashoutOffer = stakeValue * 0.90; 
                        cashoutButtonHTML = `<button class="live-cashout-action-btn" onclick="triggerLiveSportsCashout(event, '${log.ticketId}', ${currentCashoutOffer})" style="width:100%; background:#ffdf00; color:#000; border:none; padding:6px; font-weight:bold; cursor:pointer; margin-top:6px; border-radius:2px;">💰 CASH OUT: ৳${currentCashoutOffer.toFixed(2)}</button>`;
                    }

                    logHTML += `
                        <div class="history-log-card-item" style="background:#131c26; padding:10px; margin-bottom:6px; border-radius:4px; color:#fff; border-left:4px solid #00ffaa;">
                            <div class="log-match-title" style="font-weight:bold; font-size:13px;">🏟️ ${log.matchTitle || 'Match'}</div>
                            <div class="log-market-sub" style="font-size:11px; color:#ccc; margin:2px 0;">${log.marketName || 'Market'} | Pick: <b style="color:#ffdf00;">${log.selection || 'N/A'}</b></div>
                            <div class="log-data-row-flex" style="display:flex; justify-content:space-between; font-size:12px;">
                                <span>Odds: <b>${oddsValue.toFixed(2)}</b></span>
                                <span>Stake: <b style="color:#00ff66;">৳${stakeValue.toFixed(2)}</b></span>
                            </div>
                            <div class="log-payout-row" style="display:flex; justify-content:space-between; font-size:12px; margin-top:2px;">
                                <span>Payout: <b>৳${payoutValue.toFixed(2)}</b></span>
                                <span class="log-status-badge" style="background:#223140; padding:1px 5px; border-radius:2px; font-size:10px;">${log.status}</span>
                            </div>
                            ${cashoutButtonHTML}
                        </div>
                    `;
                });
                historyListContainer.innerHTML = logHTML;
            } else {
                historyListContainer.innerHTML = `<div style="text-align: center; padding: 40px; color: #888;">📊 আপনার কোনো স্পোর্টস বাজি রেকর্ড নেই ওস্তাদ!</div>`;
            }
        } catch (e) { 
            historyListContainer.innerHTML = `<div style="text-align: center; padding: 20px; color: #ff003c;">⚠️ হিস্টোরি লোড এরর!</div>`; 
        }
    }

    async function triggerLiveSportsCashout(e, ticketId, cashoutAmt) {
        if (e && e.stopPropagation) e.stopPropagation();
        if (!confirm(`🎰 আপনি কি এই বাজি টিকিটটি এখনই ৳${cashoutAmt.toFixed(2)} এ ক্যাশআউট করতে চান ওস্তাদ?`)) return;
        try {
            const response = await fetch(`${SERVER_URL}/api/sportsbook/cashout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: urlUserId, betTicketId: ticketId, cashoutAmount: cashoutAmt, wallet: urlWallet })
            });
            const result = await response.json();
            alert(result.message);
            if (result.success) {
                fetchLiveBalance();
                fetchSportsBetHistoryLog();
            }
        } catch (err) { alert("🚨 ক্যাশআউট কানেকশন ডিলে!"); }
    }

    // ==================== সকেট নেটওয়ার্ক রিয়েল-টাইম লিসেনার প্যানেল ====================
    socket.on("balanceUpdate", (data) => {
        if (data && data.username === urlUserId) {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
        }
    });

    // ==================== ইউনিভার্সাল ওতো-উইন্ডো এক্সেকিউশন কোর ====================
    window.onload = () => {
        if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
        fetchLiveBalance();
        setTimeout(fetchLiveBalance, 400);
        
        if (cachedGlobalMatches && cachedGlobalMatches.length > 0) {
            renderBet365LuxuryOddsTable(cachedGlobalMatches);
        }
    };
</script>
